@if(size.height ==1 && size.width ==1){
<div class="local-player">
  <button (click)="isPlaying ? stop() : play()">
    {{ isPlaying ? '⏸ Pause' : '▶️ Play' }}
  </button>

  <div class="timeline">
    <input type="range" [value]="currentTime()" [max]="duration()" (input)="setToTime($event)" />
  </div>

  <div class="time">
    {{ formatTime(currentTime()) }} / {{ formatTime(duration()) }}
  </div>
</div>
}
