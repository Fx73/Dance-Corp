<ion-item [class.changed]="isChanged" [title]="valueDb">

  @if (isEditing) {
  <ion-input [label]="label" [type]="type" [value]="value" (ionChange)="onInputChange($event)">
    @if(isDirty && warningMessage) {
    <p class="warning">{{ warningMessage }}</p>
    }
  </ion-input>
  }
  @else {
  <ion-label>
    <strong class="primary">{{ label }}:</strong> {{ valueDb ?? value ?? '—' }}
  </ion-label>
  }

</ion-item>
