name: Coverity Scan

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  coverity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential wget tar

      - name: Download Coverity tools
        run: |
          wget https://scan.coverity.com/download/linux64 \
            --post-data "token=${{ secrets.COVERITY_TOKEN }}&project=${{ secrets.COVERITY_PROJECT }}" \
            -O coverity.tgz
          tar xzf coverity.tgz
          mv cov-analysis* cov-analysis

      - name: Build with Coverity
        run: |
          ./cov-analysis/bin/cov-build --dir cov-int make

      - name: Create archive
        run: tar czf cov-int.tgz cov-int

      - name: Upload to Coverity Scan
        run: |
          curl \
            --form token=${{ secrets.COVERITY_TOKEN }} \
            --form email=${{ secrets.COVERITY_EMAIL }} \
            --form file=@cov-int.tgz \
            https://scan.coverity.com/builds?project=${{ secrets.COVERITY_PROJECT }}
